<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>主页 · LabNotes</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="mega-menu.jsx"></script>
<style>
  body { font-size: 15px; }

  /* ---- top nav ---- */
  .nav {
    height: 56px;
    border-bottom: 1px solid var(--line);
    background: var(--bg);
    position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center;
    padding: 0 28px; gap: 24px;
  }
  .nav-brand {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-ui); font-weight: 600; font-size: 15px;
    color: var(--fg); letter-spacing: -0.01em;
    cursor: pointer;
  }
  .nav-tabs { display: flex; gap: 4px; }
  .nav-tab {
    font-family: var(--font-ui);
    font-size: 14px;
    font-weight: 500;
    color: var(--fg-muted);
    padding: 7px 12px;
    border-radius: var(--r-md);
    cursor: pointer;
    transition: background var(--t-fast), color var(--t-fast);
  }
  .nav-tab:hover { background: var(--bg-soft); color: var(--fg); }
  .nav-tab.active { color: var(--fg); background: var(--bg-soft); }

  .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .search {
    position: relative; width: 240px;
  }
  .search input {
    width: 100%; padding: 7px 10px 7px 32px;
    font-family: var(--font-ui); font-size: 13px;
    background: var(--bg-soft);
    border: 1px solid transparent;
    border-radius: var(--r-md);
    color: var(--fg);
    transition: background var(--t-fast), border-color var(--t-fast);
  }
  .search input::placeholder { color: var(--fg-faint); }
  .search input:focus { outline: none; background: var(--bg); border-color: var(--line-strong); }
  .search svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--fg-faint); }

  .guest-badge {
    font-family: var(--font-ui);
    font-size: 12px;
    color: var(--fg-muted);
    background: var(--bg-soft);
    padding: 4px 10px;
    border-radius: var(--r-sm);
    font-weight: 500;
  }

  .avatar-trigger {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--bg-soft);
    color: var(--fg);
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 600;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    border: 1px solid var(--line);
    transition: background var(--t-fast);
  }
  .avatar-trigger:hover { background: var(--bg-hover); }

  .menu {
    position: absolute;
    top: calc(100% + 6px); right: 0;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    box-shadow: 0 6px 24px rgba(0,0,0,0.06);
    min-width: 180px;
    padding: 6px;
    font-family: var(--font-ui);
    font-size: 13.5px;
    z-index: 30;
  }
  .menu-item {
    padding: 7px 10px;
    border-radius: var(--r-sm);
    cursor: pointer;
    color: var(--fg);
    display: flex; align-items: center; gap: 8px;
    transition: background var(--t-fast);
  }
  .menu-item:hover { background: var(--bg-soft); }
  .menu-divider { height: 1px; background: var(--line); margin: 4px -6px; }
  .menu-meta { padding: 8px 10px 4px; color: var(--fg-faint); font-size: 12px; }

  /* ---- page wrap ---- */
  .page {
    max-width: 960px;
    margin: 0 auto;
    padding: 48px 28px 64px;
  }

  /* welcome */
  .hello-h {
    font-family: var(--font-serif);
    font-weight: 600;
    font-size: 36px;
    letter-spacing: -0.015em;
    line-height: 1.2;
    margin: 0 0 8px;
  }
  .hello-sub {
    font-family: var(--font-ui);
    font-size: 16px;
    color: var(--fg-muted);
    margin: 0 0 36px;
  }

  /* category tiles — 七大板块 */
  .tiles {
    display: grid;
    grid-template-columns: repeat(4, minmax(0,1fr));
    gap: 14px;
    margin-bottom: 56px;
  }
  @media (max-width: 1080px) {
    .tiles { grid-template-columns: repeat(3, minmax(0,1fr)); }
  }
  @media (max-width: 760px) {
    .tiles { grid-template-columns: 1fr; }
  }
  .tile {
    height: 140px;
    background: var(--bg-soft);
    border-radius: var(--r-lg);
    padding: 22px 24px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
    transition: background var(--t-fast);
    border: 1px solid transparent;
  }
  .tile:hover { background: #EDECE9; }
  .tile-head {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--font-ui);
    font-weight: 600;
    font-size: 18px;
    color: var(--fg);
  }
  .tile-dot {
    width: 9px; height: 9px; border-radius: 50%;
  }
  .tile-desc {
    font-family: var(--font-ui);
    font-size: 14px;
    color: var(--fg-muted);
    line-height: 1.55;
  }
  .tile-foot {
    font-family: var(--font-ui);
    font-size: 13px;
    color: var(--fg);
    font-weight: 500;
    display: flex; align-items: center; gap: 4px;
  }
  .tile-foot .arrow { transition: transform var(--t-fast); }
  .tile:hover .tile-foot .arrow { transform: translateX(2px); }

  /* section heading */
  .section { margin-bottom: 48px; }
  .section-h {
    display: flex; align-items: baseline; justify-content: space-between;
    border-bottom: 1px solid var(--line);
    padding-bottom: 10px;
    margin: 0 0 16px;
  }
  .section-h h2 {
    margin: 0;
    font-family: var(--font-ui);
    font-weight: 600;
    font-size: 18px;
    letter-spacing: -0.005em;
    color: var(--fg);
  }
  .section-h .more {
    font-family: var(--font-ui);
    font-size: 13px;
    color: var(--fg-muted);
    cursor: pointer;
  }
  .section-h .more:hover { color: var(--fg); }

  /* feed list */
  .feed-row {
    display: grid;
    grid-template-columns: 14px 1fr auto;
    gap: 14px;
    align-items: center;
    padding: 12px 12px;
    margin: 0 -12px;
    border-radius: var(--r-md);
    cursor: pointer;
    transition: background var(--t-fast);
  }
  .feed-row + .feed-row { border-top: 1px solid var(--line); }
  .feed-row:hover { background: var(--bg-soft); }
  .feed-row:hover + .feed-row { border-top-color: transparent; }
  .feed-dot {
    width: 8px; height: 8px; border-radius: 50%; margin-left: 3px;
  }
  .feed-title {
    font-family: var(--font-serif);
    font-weight: 500;
    font-size: 16px;
    color: var(--fg);
    line-height: 1.4;
    letter-spacing: -0.005em;
  }
  .feed-meta {
    font-family: var(--font-ui);
    font-size: 12.5px;
    color: var(--fg-faint);
    margin-top: 4px;
    display: flex; gap: 10px; align-items: center;
  }
  .feed-meta .sep { color: var(--line-strong); }
  .feed-stats {
    font-family: var(--font-ui);
    font-size: 12.5px;
    color: var(--fg-faint);
    display: flex; gap: 14px; align-items: center;
    white-space: nowrap;
  }
  .feed-stats span { display: inline-flex; align-items: center; gap: 4px; }

  /* trending row */
  .trend-scroll {
    display: flex;
    gap: 14px;
    overflow-x: auto;
    padding-bottom: 8px;
    margin: 0 -28px;
    padding-left: 28px; padding-right: 28px;
    scroll-snap-type: x proximity;
  }
  .trend-scroll::-webkit-scrollbar { height: 6px; }
  .trend-scroll::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

  .trend-card {
    flex: 0 0 240px;
    scroll-snap-align: start;
    cursor: pointer;
  }
  .trend-cover {
    width: 240px; height: 130px;
    border-radius: var(--r-md);
    background: var(--bg-soft);
    background-image: repeating-linear-gradient(45deg, transparent 0 12px, rgba(0,0,0,0.025) 12px 24px);
    position: relative;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--fg-faint);
    transition: filter var(--t-fast);
  }
  .trend-card:hover .trend-cover { filter: brightness(0.97); }
  .trend-rank {
    position: absolute; top: 8px; left: 10px;
    font-family: var(--font-serif);
    font-weight: 600;
    font-size: 24px;
    color: var(--fg);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .trend-title {
    font-family: var(--font-serif);
    font-weight: 600;
    font-size: 15.5px;
    line-height: 1.4;
    color: var(--fg);
    margin: 10px 0 6px;
    letter-spacing: -0.005em;
    /* clamp 2 lines */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .trend-meta {
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--font-ui);
    font-size: 12px;
    color: var(--fg-faint);
  }

  /* footer */
  .footer {
    height: 60px;
    border-top: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-ui);
    font-size: 12.5px;
    color: var(--fg-faint);
    background: var(--bg);
  }
</style>
</head>
<body>

<div id="app"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ---------- icons (inline, lucide-style) ---------- */
const I = {
  search: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  arrow:  <svg className="arrow" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
  thumb:  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M7 10v12"/><path d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H7V10l4.42-9.04a1 1 0 0 1 1.83.65L15 5.88z"/></svg>,
  msg:    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
  notebook: <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/><line x1="9" y1="6" x2="14" y2="6"/></svg>,
  logout: <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
};

/* ---------- mock data ---------- */
const CAT_COUNTS  = { research: 47, course: 29, recommend: 18, competition: 15, kaggle: 22, tool: 31, life: 11 };
const CAT_TAGCLASS = { research: 'tag-research', course: 'tag-course', recommend: 'tag-recommend', competition: 'tag-competition', kaggle: 'tag-kaggle', tool: 'tag-tool', life: 'tag-life' };

const FEED = [
  { id: 1, cat: 'kaggle',      title: '银牌方案：CV-LB 一致性的两个细节',          author: 'Zilun',    ago: '2 天前', likes: 24, comments: 6 },
  { id: 2, cat: 'recommend',   title: '2024 浙大 CS 夏令营复盘 + 时间线',                author: 'Yiwen',    ago: '3 天前', likes: 31, comments: 9 },
  { id: 3, cat: 'research',    title: '我的第一篇 NeurIPS rebuttal 学到的事',       author: 'Yixuan',   ago: '5 天前', likes: 36, comments: 12 },
  { id: 4, cat: 'course',      title: '高等数理统计 期末重点整理',                  author: 'Mingxuan', ago: '6 天前', likes: 22, comments: 4 },
  { id: 5, cat: 'life',        title: '实验室咖啡机使用指南 · 从入门到不烦人',          author: 'Linyu',    ago: '1 周前', likes: 14, comments: 5 },
];

const TRENDING = [
  { id: 't1', cat: 'competition', title: '美赛 O 奖论文 + 建模思路全公开',                       likes: 92, cover: 'mcm-paper.png' },
  { id: 't2', cat: 'kaggle',      title: '从 LB 第 27 跌到 312 的 shake-up 教训',               likes: 89, cover: 'training-curve.png' },
  { id: 't3', cat: 'recommend',   title: '如何写好一封套磁邮件 · 从档案到面谈',               likes: 78, cover: 'cold-mail.png' },
  { id: 't4', cat: 'research',    title: 'NeurIPS rebuttal 写作模板（含reviewer 心理学）',     likes: 76, cover: 'rebuttal-flow.png' },
];

/* ---------- nav ---------- */
function TopNav({ user, onLogout }) {
  const [menuOpen, setMenuOpen] = useState(false);
  const menuRef = useRef(null);

  useEffect(() => {
    const onClick = (e) => { if (menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false); };
    document.addEventListener('mousedown', onClick);
    return () => document.removeEventListener('mousedown', onClick);
  }, []);

  return (
    <nav className="nav">
      <div className="nav-brand" onClick={() => location.href = 'home.html'}>
        <span style={{ fontSize: 18 }}>📓</span>
        LabNotes
      </div>

      <div className="nav-tabs">
        <div className="nav-tab active">主页</div>
        <BrowseTabWithMenu active={false} />
        <div className={`nav-tab ${user.role === 'guest' ? 'is-disabled' : ''}`}
             style={user.role === 'guest' ? { opacity: 0.4, cursor: 'not-allowed' } : null}
             onClick={() => user.role !== 'guest' && (location.href = 'write.html')}>
          写作
        </div>
        <div className="nav-tab" onClick={() => location.href = 'schools.html'}>高校信息</div>
      </div>

      <div className="nav-right">
        <div className="search">
          {I.search}
          <input placeholder="搜索笔记、作者、标签…" />
        </div>

        {user.role === 'guest' ? (
          <>
            <span className="guest-badge">游客模式</span>
            <a className="btn btn-sm btn-primary" href="login.html" style={{ textDecoration: 'none' }}>登录</a>
          </>
        ) : (
          <div ref={menuRef} style={{ position: 'relative' }}>
            <div className="avatar-trigger" onClick={() => setMenuOpen(o => !o)}>{user.initials}</div>
            {menuOpen && (
              <div className="menu">
                <div className="menu-meta">{user.name} · {user.id}</div>
                <div className="menu-item">{I.notebook} 我的笔记</div>
                <div className="menu-item">个人设置</div>
                <div className="menu-divider"></div>
                <div className="menu-item" onClick={onLogout}>{I.logout} 退出登录</div>
              </div>
            )}
          </div>
        )}
      </div>
    </nav>
  );
}

/* ---------- tiles ---------- */
function Tiles() {
  return (
    <section className="section" style={{ marginBottom: 48 }}>
      <div className="section-h">
        <h2>七大板块</h2>
        <span className="more">查看全部 <ArrowRight size={12} /></span>
      </div>
      <div className="tiles">
        {CAT_ORDER.map(k => {
          const c = CATS[k];
          return (
            <div className="tile" key={k}>
              <div>
                <div className="tile-head">
                  <span className="tile-dot" style={{ background: c.color }}></span>
                  <CatIcon cat={k} size={18} style={{ marginRight: 2 }} />
                  {c.label}
                </div>
                <div className="tile-desc" style={{ marginTop: 8 }}>{c.desc}</div>
              </div>
              <div className="tile-foot">
                {CAT_COUNTS[k]} 篇笔记 <ArrowRight size={14} />
              </div>
            </div>
          );
        })}
      </div>
    </section>
  );
}

/* ---------- feed ---------- */
function Feed() {
  return (
    <section className="section">
      <div className="section-h">
        <h2>📌 最新动态</h2>
        <span className="more">查看全部 <ArrowRight size={12} /></span>
      </div>
      <div>
        {FEED.map(item => {
          const c = CATS[item.cat];
          return (
            <div className="feed-row" key={item.id}>
              <span className="feed-dot" style={{ background: c.color }}></span>
              <div>
                <div className="feed-title">{item.title}</div>
                <div className="feed-meta">
                  <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
                    <CatIcon cat={item.cat} size={12} />
                    {c.label}
                  </span>
                  <span className="sep">·</span>
                  <span>{item.author}</span>
                  <span className="sep">·</span>
                  <span>{item.ago}</span>
                </div>
              </div>
              <div className="feed-stats">
                <span>{I.thumb} {item.likes}</span>
                <span>{I.msg} {item.comments}</span>
              </div>
            </div>
          );
        })}
      </div>
    </section>
  );
}

/* ---------- trending ---------- */
function Trending() {
  return (
    <section className="section">
      <div className="section-h">
        <h2>🔥 本周热门</h2>
        <span className="more">查看全部 <ArrowRight size={12} /></span>
      </div>
      <div className="trend-scroll">
        {TRENDING.map((t, i) => {
          const c = CATS[t.cat];
          return (
            <div className="trend-card" key={t.id}>
              <div className="trend-cover">
                <span className="trend-rank">{String(i + 1).padStart(2, '0')}</span>
                <span style={{ position: 'absolute', bottom: 8, right: 10, fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--fg-faint)' }}>
                  [ {t.cover} ]
                </span>
              </div>
              <div className="trend-title">{t.title}</div>
              <div className="trend-meta">
                <span className={`tag tag-${t.cat}`} style={{ fontSize: 11, padding: '1px 7px' }}>
                  <span className="tag-dot"></span>
                  <CatIcon cat={t.cat} size={11} />
                  {c.label}
                </span>
                <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>{I.thumb} {t.likes}</span>
              </div>
            </div>
          );
        })}
      </div>
    </section>
  );
}

/* ---------- app ---------- */
function App() {
  // read role from sessionStorage (set by login.html)
  const [user] = useState(() => {
    let role = 'member';
    try { role = sessionStorage.getItem('labnotes_role') || 'member'; } catch (_) {}
    return role === 'guest'
      ? { role: 'guest', name: 'Guest', initials: 'G', id: '' }
      : { role: 'member', name: 'Zilun', initials: 'ZL', id: '20210914' };
  });

  const onLogout = () => {
    try { sessionStorage.removeItem('labnotes_role'); } catch (_) {}
    location.href = 'login.html';
  };

  const greeting = user.role === 'guest'
    ? 'Welcome to LabNotes 👋'
    : `Welcome back, ${user.name} 👋`;

  return (
    <>
      <TopNav user={user} onLogout={onLogout} />

      <main className="page">

        {/* 1. welcome */}
        <section style={{ marginBottom: 40 }}>
          <h1 className="hello-h">{greeting}</h1>
          <p className="hello-sub">今天又是阅读组会笔记的好日子</p>
        </section>

        {/* 2. 七大板块 */}
        <Tiles />

        {/* 3. feed */}
        <Feed />

        {/* 4. trending */}
        <Trending />

        {/* prose-claude container reserved for future inline preview, e.g. pinned post */}
        <div className="prose-claude" style={{ display: 'none' }}></div>

      </main>

      <footer className="footer">
        LabNotes · 实验室内部交流，请勿外传 · Built with ☕ and 🌙
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>

</body>
</html>
